services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5180:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - pnpm_cache:/root/.local/share/pnpm
    environment:
      - NODE_ENV=development
      - VITE_GROWTHBOOK_API_HOST=${VITE_GROWTHBOOK_API_HOST:-http://growthbook-api-placeholder}
      - VITE_GROWTHBOOK_CLIENT_KEY=${VITE_GROWTHBOOK_CLIENT_KEY:-sdk-local-default}
      - VITE_GROWTHBOOK_DEV_MODE=${VITE_GROWTHBOOK_DEV_MODE:-true}
    labels:
      - "dev.orbstack.domains=baseline.orb.local"
      - "dev.orbstack.http-port=5173"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "3080:3000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - pnpm_cache:/root/.local/share/pnpm
    environment:
      - NODE_ENV=development
    labels:
      - "dev.orbstack.domains=api.baseline.orb.local"
      - "dev.orbstack.http-port=3000"

volumes:
  frontend_node_modules:
  backend_node_modules:
  pnpm_cache:
