services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5180:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - pnpm_cache:/root/.local/share/pnpm
    environment:
      - NODE_ENV=development
    labels:
      - "dev.orbstack.domains=baseline.orb.local"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "3080:3000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - pnpm_cache:/root/.local/share/pnpm
    environment:
      - NODE_ENV=development
    labels:
      - "dev.orbstack.domains=api.baseline.orb.local"

volumes:
  frontend_node_modules:
  backend_node_modules:
  pnpm_cache:
